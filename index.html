<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Languages of South Asia</title>
        <meta name="description" content="Mother tongues of India, Pakistan, Nepal and Bangladesh, mapped from census returns.">
        <script src="https://d3js.org/d3.v5.min.js"></script>
        <style>
            :root {
                --bg: #f7f7f5;
                --panel: #ffffff;
                --ink: #1b1b1b;
                --muted: #6b6b6b;
                --line: #d9d9d6;
                --nodata: #e8e8e6;
                --land: #dcdcd6;
            }
            @media (prefers-color-scheme: dark) {
                :root {
                    --bg: #17181a;
                    --panel: #212327;
                    --ink: #ececec;
                    --muted: #9a9a9a;
                    --line: #3a3c40;
                    --nodata: #2b2d31;
                    --land: #35383d;
                }
            }

            * { box-sizing: border-box; }
            html, body { height: 100%; }
            body {
                margin: 0;
                background: var(--bg);
                color: var(--ink);
                font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif;
                overflow: hidden;
            }

            #map { display: block; width: 100vw; height: 100vh; cursor: grab; }
            #map:active { cursor: grabbing; }
            #map path { vector-effect: non-scaling-stroke; }
            #map path.hover { stroke: var(--ink); stroke-width: 1.2px; }
            #dot-layer path { fill: none; stroke-width: 1.6px; stroke-linecap: round; vector-effect: non-scaling-stroke; }

            .panel {
                position: absolute;
                top: 16px; left: 16px;
                width: 366px;
                max-height: calc(100vh - 32px);
                display: flex;
                flex-direction: column;
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 10px;
                box-shadow: 0 6px 24px rgba(0, 0, 0, 0.12);
            }
            .panel > * { padding: 0 16px; }
            .panel header { padding-top: 14px; }
            h1 { margin: 0; font-size: 19px; font-weight: 600; letter-spacing: -0.01em; }
            .sub { margin: 3px 0 12px; color: var(--muted); font-size: 12.5px; }

            .controls { border-top: 1px solid var(--line); padding-top: 12px; padding-bottom: 12px; }
            label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase;
                    letter-spacing: 0.05em; color: var(--muted); margin-bottom: 4px; }
            select, input[type=search] {
                width: 100%; padding: 7px 8px; margin-bottom: 10px;
                font: inherit; font-size: 13.5px;
                color: var(--ink); background: var(--bg);
                border: 1px solid var(--line); border-radius: 6px;
            }
            select:focus, input:focus { outline: 2px solid #6b8fd6; outline-offset: -1px; }
            .check { display: flex; align-items: center; gap: 7px; }
            .check input { margin: 0; }
            .check label { margin: 0; text-transform: none; font-size: 13px; font-weight: 400;
                           letter-spacing: 0; color: var(--ink); }

            /* header and master ring stay put; only the language list scrolls */
            .legend { border-top: 1px solid var(--line); padding-top: 12px; padding-bottom: 14px;
                      font-size: 12.5px; display: flex; flex-direction: column;
                      flex: 1; min-height: 0; }
            .legend .list { overflow-y: auto; min-height: 0; overscroll-behavior: contain; }
            .legend .list::-webkit-scrollbar { width: 7px; }
            .legend .list::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

            .legend .master { display: flex; align-items: center; gap: 11px; margin-bottom: 10px; }
            .legend .master .ring { flex: none; line-height: 0; }
            .legend .grow { flex: 1; min-width: 0; }
            .legend .big { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }

            .legend .row { display: grid; grid-template-columns: 12px 1fr 38px 46px 46px;
                           align-items: center; gap: 7px; padding: 1.5px 0; }
            .legend .row.head { color: var(--muted); font-size: 10px; font-weight: 600;
                                text-transform: uppercase; letter-spacing: 0.04em;
                                padding-bottom: 3px; padding-right: 7px;
                                border-bottom: 1px solid var(--line); }
            .legend .swatch { width: 12px; height: 12px; border-radius: 3px; flex: none; }
            .legend .name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
            .legend .num { text-align: right; font-variant-numeric: tabular-nums; }
            .legend .row:not(.head) .num { color: var(--muted); }
            .legend .fam { color: var(--muted); font-size: 11px; }
            .legend .ramp { height: 10px; border-radius: 3px; margin: 4px 0 3px; }
            .legend .ends { display: flex; justify-content: space-between; color: var(--muted); font-size: 11px; }
            .status { color: var(--muted); font-size: 12px; padding-top: 6px; min-height: 18px; }

            .tooltip {
                position: absolute; pointer-events: none; opacity: 0;
                width: 320px; max-width: 90vw;
                padding: 9px 11px;
                background: var(--panel); color: var(--ink);
                border: 1px solid var(--line); border-radius: 8px;
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.16);
                font-size: 12.5px; transition: opacity 120ms;
            }
            .tooltip.pinned {
                pointer-events: auto;
                border-color: var(--muted);
                box-shadow: 0 8px 28px rgba(0, 0, 0, 0.3);
            }
            .tooltip h2 { margin: 0; padding-right: 18px; font-size: 13.5px; font-weight: 600; }
            .tooltip .where, .tooltip .note, .tooltip .hint { color: var(--muted); font-size: 11.5px; }
            .tooltip .note { margin-top: 5px; font-style: italic; }
            .tooltip .hint { margin-top: 6px; text-align: right; opacity: 0.75; }
            .tooltip .split { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
            .tooltip .split svg { flex: none; }
            .tooltip .grow { flex: 1; min-width: 0; }

            /* Every language is listed; the list itself scrolls, sized in JS to show exactly
               five rows however tall they wrap to. Only this area scrolls — the ring, the
               header and the aside stay put. */
            .tooltip .scroll { overflow-y: auto; overflow-x: hidden; overscroll-behavior: contain; }
            .tooltip .scroll::-webkit-scrollbar { width: 7px; }
            .tooltip .scroll::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

            .tooltip table { width: 100%; border-collapse: collapse; table-layout: fixed; }
            .tooltip td { padding: 1px 0; vertical-align: top; }
            /* names wrap rather than widening the card or getting cut off */
            .tooltip td:first-child { white-space: normal; overflow-wrap: anywhere; }
            .tooltip td:nth-child(2), .tooltip td:nth-child(3) { text-align: right; white-space: nowrap;
                font-variant-numeric: tabular-nums; padding-left: 10px; }
            .tooltip td:nth-child(2) { width: 68px; }
            .tooltip td:nth-child(3) { width: 48px; color: var(--muted); }
            .tooltip .chip { display: inline-block; width: 8px; height: 8px; border-radius: 2px;
                margin-right: 5px; vertical-align: baseline; }
            .tooltip .aside { margin-top: 8px; padding-top: 7px; border-top: 1px dashed var(--line); }
            .tooltip .close {
                position: absolute; top: 6px; right: 7px;
                width: 20px; height: 20px; padding: 0; line-height: 18px;
                font-size: 16px; cursor: pointer;
                color: var(--muted); background: none;
                border: 1px solid transparent; border-radius: 4px;
            }
            .tooltip .close:hover { color: var(--ink); border-color: var(--line); }

            footer { padding-bottom: 12px; font-size: 11px; color: var(--muted); }
            footer a { color: var(--muted); }

            @media (max-width: 640px) {
                .panel { width: auto; left: 8px; right: 8px; top: 8px; max-height: 60vh; }
            }
        </style>
    </head>
    <body>
        <svg id="map"></svg>

        <div class="panel">
            <header>
                <h1>Languages of South Asia</h1>
                <p class="sub">Mother tongues from the censuses of India&nbsp;(2011), Pakistan&nbsp;(2017),
                    Nepal&nbsp;(2011) and Bangladesh&nbsp;(2011).</p>
            </header>

            <div class="controls">
                <label for="view">Show</label>
                <select id="view"></select>

                <label for="lang">Or a single language</label>
                <input id="lang" type="search" list="langlist" placeholder="Search 600+ mother tongues…" autocomplete="off">
                <datalist id="langlist"></datalist>

                <div class="check">
                    <input type="checkbox" id="dots">
                    <label for="dots">Dot density (1 dot = 10,000 speakers)</label>
                </div>
                <div class="status" id="status">Loading…</div>
            </div>

            <div class="legend" id="legend"></div>

            <footer>
                Grey areas have no census data.
                <a href="https://github.com/aryamanarora/india-census-2011">Source and method</a>.
            </footer>
        </div>

        <script src="main.js"></script>
    </body>
</html>
